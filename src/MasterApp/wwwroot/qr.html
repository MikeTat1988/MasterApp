<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MasterApp Phone QR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1319;
      --text: #edf2f7;
      --muted: #9ba8b8;
      --accent: #4f7cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(79, 124, 255, 0.16), transparent 26rem),
        linear-gradient(180deg, #0f1319 0%, #111723 100%);
      color: var(--text);
    }
    .panel {
      width: min(100%, 560px);
      padding: 28px;
      border-radius: 26px;
      background: rgba(23, 28, 36, 0.94);
      border: 1px solid rgba(255,255,255,0.08);
      text-align: center;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
    }
    .logo {
      width: 62px;
      height: 62px;
      margin: 0 auto 14px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #355fdd);
      color: white;
    }
    h1 { margin: 0 0 8px; font-size: 32px; }
    p { color: var(--muted); line-height: 1.55; }
    img {
      width: min(100%, 280px);
      height: auto;
      border-radius: 22px;
      background: white;
      padding: 14px;
      margin: 18px 0;
    }
    .url {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      word-break: break-word;
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="logo">M</div>
    <h1>Open on phone</h1>
    <p>Scan this QR code from your phone to open the public MasterApp site.</p>
    <img src="/api/phone-qr.svg" alt="QR code for MasterApp public URL">
    <div class="url" id="urlText">Loading public URL...</div>
  </main>
  <script>
    async function loadStatus() {
      const response = await fetch('/api/status', { cache: 'no-store' });
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      const status = await response.json();
      document.getElementById('urlText').textContent = status.publicUrl;
    }
    loadStatus().catch(error => {
      document.getElementById('urlText').textContent = error.message;
    });
  </script>
</body>
</html>
